exp_name: ldf_hybrid_humanml3d_babel
seed: 1234
debug: false
train: true
save_dir: /data1/yuankai/text2Motion/Floodcontrol/ldf
resume_ckpt: null
test_ckpt: null

wandb_info:
  project: Floodcontrol

trainer:
  max_steps: 300000
  accelerator: gpu
  devices: 1
  strategy: auto
  precision: bf16-mixed
  log_every_n_steps: 50

validation:
  validation_steps: 1000
  save_every_n_steps: 10000
  save_top_k: 20
  seed: 4321

vae:
  target: models.vae_wan_1d.BodyVAE
  checkpoint_path: /data1/yuankai/text2Motion/Floodcontrol/vae/20260715_164325_vae_body265/last.ckpt
  params:
    latent_dim: 128
    hidden_dim: 512
    encoder_layers: 6
    decoder_layers: 6
    kernel_size: 3
    dropout: 0.0
    motion_stats_path: ${dirs.raw_data}/HumanML3D_motion/motion_stats.npz
    latent_stats_path: /data1/yuankai/text2Motion/Floodcontrol/vae/20260715_164325_vae_body265/latent_stats.npz

data:
  target: datasets.multi.MultiDataset
  # Keep canonical HumanML3D root normalization when adding BABEL.
  root_stats_path: ${dirs.raw_data}/HumanML3D_motion/root_stats.npz
  text_embeddings_path: ${dirs.raw_data}/HumanML3D_BABEL_t5_text_embeddings.pt
  datasets:
    - target: datasets.humanml3d.HumanML3DDataset
      text_meta_paths:
        - ${dirs.raw_data}/HumanML3D_motion/all.txt
      train_meta_paths:
        - ${dirs.raw_data}/HumanML3D_motion/train.txt
      val_meta_paths:
        - ${dirs.raw_data}/HumanML3D_motion/val.txt
      artifact_path: artifacts
      text_path: texts
    - target: datasets.babel.BABELDataset
      text_meta_paths:
        - ${dirs.raw_data}/BABEL_motion/all.txt
      train_meta_paths:
        - ${dirs.raw_data}/BABEL_motion/train.txt
      val_meta_paths:
        - ${dirs.raw_data}/BABEL_motion/val.txt
      artifact_path: artifacts
      text_path: texts
  min_frames: 20
  max_frames: 200
  random_yaw: true
  train_batch_size: 16
  val_batch_size: 16
  num_workers: 16
  pin_memory: true

text_encoder:
  checkpoint_path: ${dirs.deps}/t5_umt5-xxl-enc-bf16/models_t5_umt5-xxl-enc-bf16.pth
  tokenizer_path: ${dirs.deps}/t5_umt5-xxl-enc-bf16/google/umt5-xxl
  text_len: 128
  dtype: bfloat16

training:
  text_dropout: 0.1
  constraint_dropout: 0.1
  window:
    max_tokens: 50
    generation_tokens: 5
    sampling: random_generation_start
  max_horizon_token: 45
  constraint_sampling:
    dense_probability: 0.5
    waypoint_probability: 0.25
    goal_probability: 0.25
    max_waypoint_count: 4

loss:
  root_weight: 1.0
  body_weight: 1.0
  rollout_weight: 1.0
  offpath_beta_min: 0.1
  root_boundary_weight: 0.0

self_forcing:
  enabled: true
  # global_step [0,100k): K=1; [100k,200k): K=2; [200k,300k): K=5.
  phase_start_step: 100000
  phase_steps: 200000
  k_schedule:
    - [0.0, 2]
    - [0.5, 5]
  teacher_replay:
    2: 0.0
    5: 0.0

model:
  target: models.diffusion_forcing_wan.LDF
  ema_decay: 0.99
  params:
    hidden_dim: 1024
    ffn_dim: 2048
    freq_dim: 256
    text_dim: 4096
    text_len: ${text_encoder.text_len}
    num_heads: 8
    root_num_layers: 8
    body_num_layers: 8
    chunk_size: 5
    noise_steps: 10
    fps: 20.0
    time_embedding_scale: 1.0
    cfg_mode: separated
    cfg_scale_text: 1.0
    cfg_scale_constraint: 1.0
    cfg_scale_joint: 1.0
    prediction_type: vel

optimizer:
  target: AdamW
  params:
    lr: 2.0e-4
    betas: [0.9, 0.99]
    weight_decay: 0.0
    eps: 1.0e-8

lr_scheduler:
  target: diffusers.optimization.get_cosine_schedule_with_warmup
  params:
    num_warmup_steps: 5000
    num_training_steps: ${trainer.max_steps}
