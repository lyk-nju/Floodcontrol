status: BLOCKED_ON_LDF_CHECKPOINT
message: >-
  The strict four-frame BodyVAE and atomic Hybrid inference runtime are ready.
  Web model loading remains blocked until a formally trained LDF checkpoint,
  frozen root statistics and checkpoint loader contract are available.

web:
  target_fps: 20.0

  inference:
    window_tokens: 50
    max_horizon_token: 10
    num_denoise_steps: 10
    rebase_on_roll: true

  guidance:
    mode: separated
    scale_text: 1.0
    scale_constraint: 1.0
    scale_joint: 1.0

  buffer:
    # One chunk is one model commit and always contains four frames.
    target_chunks: 2
    capacity_chunks: 8
    chunk_wait_timeout_seconds: 0.5

  session:
    consumption_timeout_seconds: 5.0
    monitor_interval_seconds: 1.0
    worker_stop_timeout_seconds: 5.0
