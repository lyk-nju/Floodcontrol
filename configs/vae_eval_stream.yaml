device: cuda:0
sample_count: 10
output_dir: eval/vae/output/stream
stream_parity_atol: 1.0e-4

model:
  model_id: vae_body259
  checkpoint_path: null
  params:
    latent_dim: 128
    hidden_dim: 512
    encoder_layers: 6
    decoder_layers: 6
    kernel_size: 3
    dropout: 0.0

datasets:
  humanml3d:
    val_meta_path: /data1/yuankai/text2Motion/FloodDiffusion/raw_data/HumanML3D_motion_local/val.txt
    artifact_path: artifacts
  babel:
    val_meta_path: /data1/yuankai/text2Motion/FloodDiffusion/raw_data/BABEL_motion_local/val.txt
    artifact_path: artifacts

render:
  enabled: true
  fps: 20
