exp_name: vae_body265_humanml3d_babel
seed: 1234
debug: false
train: true
save_dir: /data1/yuankai/text2Motion/Floodcontrol/vae
resume_ckpt: null
test_ckpt: null

trainer:
  max_steps: 300000
  accelerator: gpu
  devices: 1
  strategy: auto
  log_every_n_steps: 50
validation:
  validation_steps: 1000
  save_every_n_steps: 10000
  save_top_k: 20

data:
  target: datasets.multi.MultiDataset
  datasets:
    - target: datasets.humanml3d.HumanML3DDataset
      train_meta_paths:
        - ${dirs.raw_data}/HumanML3D_motion/train.txt
      val_meta_paths:
        - ${dirs.raw_data}/HumanML3D_motion/val.txt
      artifact_path: artifacts
      text_path: null
    - target: datasets.babel.BABELDataset
      train_meta_paths:
        - ${dirs.raw_data}/BABEL_motion/train.txt
      val_meta_paths:
        - ${dirs.raw_data}/BABEL_motion/val.txt
      artifact_path: artifacts
      text_path: texts
  train_batch_size: 128
  val_batch_size: 128
  num_workers: 16
  min_frames: 20
  max_frames: 200
  random_yaw: true

model:
  target: models.vae_wan_1d.BodyVAE
  ema_decay: 0.99
  params:
    latent_dim: 128
    hidden_dim: 512
    encoder_layers: 6
    decoder_layers: 6
    kernel_size: 3
    dropout: 0.0
    fps: 20.0
    motion_stats_path: ${dirs.raw_data}/HumanML3D_BABEL_motion_stats.npz
    latent_stats_path: null

loss:
  lambda_position: 1.0
  lambda_rotation: 1.0
  lambda_velocity: 1.0
  lambda_contact: 1.0
  lambda_skating: 0.01
  beta_kl: 1.0e-5
  kl_warmup_steps: 0

optimizer:
  target: AdamW
  params:
    lr: 2.0e-4
    betas: [0.9, 0.99]
    weight_decay: 0.0
    eps: 1.0e-8
lr_scheduler:
  target: diffusers.optimization.get_constant_schedule_with_warmup
  params:
    num_warmup_steps: 1000
