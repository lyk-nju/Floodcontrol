base_config: ldf_base.yaml

dirs:
  deps: /data/home/shengqiuProf_user_yuankai/FloodDiffusion/deps
  outputs: /data/home/shengqiuProf_user_yuankai/FloodDiffusion/outputs
  raw_data: /data/home/shengqiuProf_user_yuankai/FloodDiffusion/raw_data

save_dir: ./outputs/ldf

trainer:
  devices: 8

vae:
  checkpoint_path: /data/home/shengqiuProf_user_yuankai/Floodcontrol/outputs/vae/step_299999.ckpt
  params:
    latent_stats_path: /data/home/shengqiuProf_user_yuankai/Floodcontrol/outputs/vae/latent_stats.npz

data:
  target: datasets.humanml3d.HumanML3DDataset
  text_embeddings_path: ${dirs.raw_data}/HumanML3D_motion/t5_text_embeddings.pt
  text_meta_paths:
    - ${dirs.raw_data}/HumanML3D_motion/all.txt
  train_meta_paths:
    - ${dirs.raw_data}/HumanML3D_motion/train.txt
  val_meta_paths:
    - ${dirs.raw_data}/HumanML3D_motion/val.txt
  test_probe_meta_paths:
    dense_xz:
      - ${dirs.raw_data}/HumanML3D_motion/test_min.txt
  artifact_path: artifacts
  text_path: texts
  train_batch_size: 64
  val_batch_size: 16
  num_workers: 2
