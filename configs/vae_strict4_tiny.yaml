exp_name: vae_strict4_tiny
seed: 1234
debug: true
train: true
save_dir: ./outputs
resume_ckpt: null
test_ckpt: null

trainer:
  max_steps: 20
  accelerator: cpu
  devices: 1
  log_every_n_steps: 1
validation:
  validation_steps: 10
  test_steps: 20
  save_every_n_steps: 20
  save_top_k: 1

data:
  target: datasets.strict4.Strict4ArtifactDataset
  collate_fn: datasets.strict4.collate_strict4
  manifest_path: null
  train_bs: 2
  val_bs: 2
  test_bs: 2
  num_workers: 0
  min_frames: 8
  max_frames: 16
  random_yaw: true

model:
  target: models.vae_wan_1d.BodyVAE
  ema_decay: 0.99
  params:
    latent_dim: 128
    hidden_dim: 32
    encoder_layers: 2
    decoder_layers: 2
    kernel_size: 3
    dropout: 0.0
    allow_identity_statistics: true

loss:
  lambda_position: 1.0
  lambda_rotation: 1.0
  lambda_velocity: 1.0
  lambda_contact: 1.0
  lambda_skating: 0.01
  beta_kl: 1.0e-4
  kl_warmup_steps: 10

optimizer:
  target: AdamW
  params: {lr: 2.0e-4}
lr_scheduler:
  target: diffusers.optimization.get_cosine_schedule_with_warmup
  params: {num_warmup_steps: 2, num_training_steps: 20}
